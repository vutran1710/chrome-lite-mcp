name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: cd server && npm ci

      - name: Build release tarball
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mkdir -p dist/chrome-lite-mcp/server
          mkdir -p dist/chrome-lite-mcp/extension
          mkdir -p dist/chrome-lite-mcp/docs

          cp -r server/index.js server/bridge.js server/tools.js server/package.json server/node_modules dist/chrome-lite-mcp/server/
          cp -r extension/* dist/chrome-lite-mcp/extension/
          cp -r docs/* dist/chrome-lite-mcp/docs/

          cd dist
          tar -czf "chrome-lite-mcp-${TAG_NAME}.tar.gz" -C chrome-lite-mcp .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/chrome-lite-mcp-*.tar.gz
          generate_release_notes: true
